<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="description"
    content="Charlie Stimac — personal website coming soon."
  />

  <title>Charlie Stimac — Coming Soon</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="landing-page">

    <section class="brand" aria-labelledby="site-title">

      <div class="logo-wrapper">
        <img
          class="brand-logo"
          src="CSLOGO.png"
          alt="Charlie Stimac logo"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
        />

        <div class="logo-fallback" aria-label="Charlie Stimac logo">
          CS
        </div>
      </div>

      <h1 id="site-title">Charlie Stimac</h1>

      <p class="coming-soon">
        Coming soon
      </p>

    </section>

    <p class="status">
      <span class="status-dot" aria-hidden="true"></span>
      Personal site in progress
    </p>

  </main>
</body>
</html>
