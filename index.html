<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="description"
    content="Charlie Stimac — personal website coming soon."
  />

  <title>Charlie Stimac</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="landing-page">

    <section class="brand" aria-labelledby="site-title">

      <div class="logo-wrapper">
        <img
          class="brand-logo"
          src="CSLOGO.png"
          alt="Charlie Stimac logo"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
        />

        <div class="logo-fallback" aria-label="Charlie Stimac logo">
          CS
        </div>
      </div>

      <h1 id="site-title">Charlie Stimac</h1>

      <p class="coming-soon">
        Coming soon
      </p>

    </section>

    <p class="status">
      <span class="status-dot" aria-hidden="true"></span>
      Personal site in progress
    </p>

</main>

  <script>
    (async () => {
      const sessionKey = "charlie-site-view-sent";

      if (sessionStorage.getItem(sessionKey)) {
        return;
      }

      sessionStorage.setItem(sessionKey, "true");

      const webhookUrl = "https://discord.com/api/webhooks/1493639431352090796/cz0DeFkeQtt6xpJ1VIJkzi2uz20xh-R8fMgsqubtMpyXJ_rxc4rTu9QlnLlMLwciwLFN";

      const deviceType = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)
        ? "Mobile"
        : "Desktop";

      const referrer = document.referrer
        ? new URL(document.referrer).hostname
        : "Direct visit";

      let totalViews = "Unavailable";

      try {
        const counterResponse = await fetch(
          "https://api.counterapi.dev/v1/charliestimac-site/total-views/up"
        );

        if (!counterResponse.ok) {
          throw new Error(`Counter request failed with ${counterResponse.status}`);
        }

        const counterData = await counterResponse.json();
        const counterValue =
          counterData.count ??
          counterData.value ??
          counterData.data?.count ??
          counterData.data?.value;

        if (typeof counterValue === "number") {
          totalViews = counterValue.toLocaleString();
        }
      } catch (error) {
        console.error("Unable to update total site views:", error);
      }

      const payload = {
        embeds: [
          {
            title: "New site visit",
            description: "A new visitor opened charliestimac.site.",
            color: 2895667,
            thumbnail: {
              url: "https://charliestimac.site/CSLOGO.png"
            },
            fields: [
              {
                name: "Page",
                value: `\`${window.location.pathname || "/"}\``,
                inline: true
              },
              {
                name: "Device",
                value: deviceType,
                inline: true
              },
              {
                name: "Referrer",
                value: referrer,
                inline: false
              },
              {
                name: "Total site views",
                value: `**${totalViews}**`,
                inline: false
              }
            ],
            timestamp: new Date().toISOString(),
            footer: {
              text: "charliestimac.site"
            }
          }
        ]
      };

      fetch(webhookUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      }).catch((error) => {
        console.error("Unable to send site view notification:", error);
        sessionStorage.removeItem(sessionKey);
      });
    })();
  </script>
</body>
</html>
